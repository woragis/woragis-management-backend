name: woragis-management-backend

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  postgres_whatsapp_data:
  media_data:
  whatsapp_session_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-woragis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woragis}
      POSTGRES_DB: ${POSTGRES_DB:-woragis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-whatsapp:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${WHATSAPP_POSTGRES_USER:-woragis}
      POSTGRES_PASSWORD: ${WHATSAPP_POSTGRES_PASSWORD:-woragis}
      POSTGRES_DB: ${WHATSAPP_POSTGRES_DB:-whatsapp}
    volumes:
      - postgres_whatsapp_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-woragis}:${POSTGRES_PASSWORD:-woragis}@postgres:5432/${POSTGRES_DB:-woragis}?sslmode=disable}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-only-change-me}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-}
      MEDIA_STORAGE: ${MEDIA_STORAGE:-local}
      MEDIA_STORAGE_DIR: ${MEDIA_STORAGE_DIR:-/data/media}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://127.0.0.1:8080/v1/public/media}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-auto}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      MIGRATIONS_DIR: ${MIGRATIONS_DIR:-/migrations}
      SKIP_SQL_MIGRATIONS: ${SKIP_SQL_MIGRATIONS:-0}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-1}
      METRICS_ENABLED: ${METRICS_ENABLED:-1}
      CREATIVES_API_URL: ${CREATIVES_API_URL:-}
      CREATIVES_API_KEY: ${CREATIVES_API_KEY:-}
      WORKER_API_KEY: ${WORKER_API_KEY:-}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WHATSAPP_WORKER_URL: ${WHATSAPP_WORKER_URL:-http://whatsapp-worker:3001}
      CONTENT_THUMBNAIL_DEFAULT_SIZE: ${CONTENT_THUMBNAIL_DEFAULT_SIZE:-1280x720}
    volumes:
      - media_data:/data/media
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  scheduler-worker:
    build:
      context: ./scheduler-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3004
      MANAGEMENT_API_URL: http://api:8080
      WORKER_API_KEY: ${WORKER_API_KEY:-}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-60000}
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3004/"]
      interval: 15s
      timeout: 5s
      retries: 10

  agent-worker:
    build:
      context: ./agent-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3002
      MANAGEMENT_API_URL: http://api:8080
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      CHANNEL_WORKER_KEY: ${CHANNEL_WORKER_KEY:-${AGENT_API_KEY:-}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_WORKER_URL: http://telegram-worker:3003
      WHATSAPP_WORKER_URL: http://whatsapp-worker:3001
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/"]
      interval: 15s
      timeout: 5s
      retries: 10

  telegram-worker:
    build:
      context: ./telegram-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3003
      AGENT_WORKER_URL: http://agent-worker:3002
      CHANNEL_WORKER_KEY: ${CHANNEL_WORKER_KEY:-${AGENT_API_KEY:-}}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      agent-worker:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  whatsapp-worker:
    build:
      context: ./whatsapp-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: ${WHATSAPP_DATABASE_URL:-postgres://${WHATSAPP_POSTGRES_USER:-woragis}:${WHATSAPP_POSTGRES_PASSWORD:-woragis}@postgres-whatsapp:5432/${WHATSAPP_POSTGRES_DB:-whatsapp}?sslmode=disable}
      MANAGEMENT_API_URL: http://api:8080
      WORKER_API_KEY: ${WORKER_API_KEY:-}
      AGENT_WORKER_URL: ${AGENT_WORKER_URL:-http://agent-worker:3002}
      CHANNEL_WORKER_KEY: ${CHANNEL_WORKER_KEY:-${AGENT_API_KEY:-}}
      SESSION_DIR: /data/session
      TZ: ${WHATSAPP_TZ:-America/Sao_Paulo}
    volumes:
      - whatsapp_session_data:/data/session
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres-whatsapp:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 10
